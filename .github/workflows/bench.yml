name: Benchmark

on:
  pull_request:
    branches: [main]

jobs:
  benchmark:
    name: Criterion Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout lazippy sibling
        uses: actions/checkout@v4
        with:
          repository: JackDanger/lazippy
          path: lazippy-sibling

      - name: Move lazippy into sibling location
        run: |
          # actions/checkout cannot check out into a parent directory, so we land
          # it under the workspace and then move it.
          mkdir -p ../lazippy
          cp -r lazippy-sibling/. ../lazippy/
          rm -rf ../lazippy/.git lazippy-sibling

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks
        run: cargo bench --workspace -- --output-format bencher | tee bench.txt
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: bench.txt
