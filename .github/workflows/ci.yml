name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-13]
    steps:
      - uses: actions/checkout@v4

      - name: Checkout lazippy sibling
        uses: actions/checkout@v4
        with:
          repository: JackDanger/lazippy
          path: lazippy-sibling

      - name: Move lazippy into sibling location
        run: |
          # actions/checkout cannot check out into a parent directory, so we land
          # it under the workspace and then move it.
          mkdir -p ../lazippy
          cp -r lazippy-sibling/. ../lazippy/
          rm -rf ../lazippy/.git lazippy-sibling

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install 7zz
        run: bash scripts/install_7zz.sh

      - name: Verify 7zz
        run: |
          7zz | head -1 || (echo "7zz not found"; exit 1)

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --release
