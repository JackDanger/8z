name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-matrix:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Checkout sibling crates
        run: bash scripts/checkout_siblings.sh

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install 7zz
        run: bash scripts/install_7zz.sh

      - name: Verify 7zz
        run: |
          7zz | head -1 || (echo "7zz not found"; exit 1)

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --release

  # Aggregator check named exactly `test` — this is the status check name the
  # branch ruleset requires. It passes only if every matrix entry above passes.
  # Without this aggregator, the ruleset's required-check name never appears in
  # the PR's check list (the matrix emits "Test on <os>", not "test").
  test:
    name: test
    needs: test-matrix
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify matrix succeeded
        run: |
          if [[ "${{ needs.test-matrix.result }}" != "success" ]]; then
            echo "test-matrix did not succeed: ${{ needs.test-matrix.result }}"
            exit 1
          fi
          echo "All matrix entries passed."
