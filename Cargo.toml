[workspace]
members = ["."]
resolver = "2"

[package]
name = "sevenzippy"
version = "0.0.1"
edition = "2021"
description = "Pure-Rust 7z archive implementation. Umbrella over the zippy family of codec crates."
license = "Zlib"
repository = "https://github.com/JackDanger/7zippy"
authors = ["Jack Danger Canty"]
build = "build.rs"
default-run = "7zippy"

[lib]
name = "sevenzippy"
path = "src/lib.rs"

[[bin]]
name = "7zippy"
path = "src/main.rs"

[dependencies]
thiserror = "1"
crc32fast = "1"

# Codec sub-crates (feature-gated).
lazippy = { version = "0.1", path = "../lazippy", optional = true }
# lazippier   = { version = "0.0.1", path = "../lazippier",   optional = true }
# pippyzippy  = { version = "0.0.1", path = "../pippyzippy",  optional = true }
bzippy2     = { version = "0.1",   path = "../bzippy2",     optional = true }
# gzippy 0.5 does not yet expose raw-deflate primitives (its public API only
# produces gzip-framed output); using flate2 directly for Phase 1 Deflate
# support until upstream adds a raw-deflate API.
# See: https://github.com/JackDanger/gzippy/issues/91
flate2      = { version = "1",                              optional = true }
# jumpzippy   = { version = "0.0.1", path = "../jumpzippy",   optional = true }
# jumpzippier = { version = "0.0.1", path = "../jumpzippier", optional = true }
# deltazippy  = { version = "0.0.1", path = "../deltazippy",  optional = true }
# lockzippy   = { version = "0.0.1", path = "../lockzippy",   optional = true }

[dev-dependencies]
tempfile = "3"
criterion = { version = "0.5", features = ["html_reports"] }

[features]
default = ["lzma", "deflate", "bzip2", "delta"]
lzma    = ["dep:lazippy"]
deflate = ["dep:flate2"]
bzip2   = ["dep:bzippy2"]
delta   = []  # in-tree implementation; no sub-crate dependency
# lzma2   = ["dep:lazippier", "lzma"]
# ppmd    = ["dep:pippyzippy"]
# bcj     = ["dep:jumpzippy"]
# bcj2    = ["dep:jumpzippier"]
# delta   = ["dep:deltazippy"]
# crypto  = ["dep:lockzippy"]

[profile.release]
lto           = "fat"
codegen-units = 1
opt-level     = 3
strip         = true

[[bench]]
name = "archive_read"
harness = false

[[bench]]
name = "archive_write"
harness = false

[[bench]]
name = "container_parse"
harness = false
